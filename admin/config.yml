backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "pages"
    label: "Strani"
    files:
      - name: "home"
        label: "Domača stran"
        file: "content/home.json"
        fields:
          - {label: "Hero naslov", name: "hero_title", widget: "string"}
          - {label: "Hero besedilo", name: "hero_text", widget: "text"}
          - {label: "Statistika 1 - število", name: "stat1_num", widget: "string"}
          - {label: "Statistika 2 - število", name: "stat2_num", widget: "string"}
